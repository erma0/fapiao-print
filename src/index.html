<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>电子发票批量打印工具</title>
<style>
  :root {
    --bg: #eef2f7; --surface: #ffffff; --surface2: #f5f8fc;
    --border: #d8e0ea; --border-focus: #3b82f6;
    --text-primary: #1a202c; --text-secondary: #4a5568; --text-muted: #94a3b8;
    --accent: #2563eb; --accent-hover: #1d4ed8; --accent-light: #dbeafe;
    --success: #10b981; --success-light: #d1fae5;
    --warning: #f59e0b; --warning-light: #fef3c7;
    --danger: #ef4444; --danger-light: #fee2e2;
    --shadow-sm: 0 1px 3px rgba(0,0,0,0.06);
    --shadow: 0 4px 14px rgba(0,0,0,0.08);
    --shadow-lg: 0 12px 36px rgba(0,0,0,0.12);
    --radius: 10px; --radius-sm: 6px;
  }
  /* ===== Dark Theme ===== */
  html.dark {
    --bg: #1a1a2e; --surface: #16213e; --surface2: #1a1a2e;
    --border: #2a2a4a; --border-focus: #5b8def;
    --text-primary: #e2e8f0; --text-secondary: #a0aec0; --text-muted: #636e80;
    --accent: #5b8def; --accent-hover: #4a7ade; --accent-light: #1e2a4a;
    --success: #38b2ac; --success-light: #1a3a36;
    --warning: #d69e2e; --warning-light: #3a3520;
    --danger: #fc8181; --danger-light: #3a2020;
    --shadow-sm: 0 1px 3px rgba(0,0,0,0.3);
    --shadow: 0 4px 14px rgba(0,0,0,0.4);
    --shadow-lg: 0 12px 36px rgba(0,0,0,0.5);
  }
  html.dark select, html.dark input[type="number"], html.dark input[type="text"] {
    background: #1a1a2e; color: #e2e8f0; border-color: #2a2a4a;
  }
  html.dark select option { background: #16213e; color: #e2e8f0; }
  html.dark .upload-zone { background: #1a1a2e; }
  html.dark .file-item:hover { background: #1e2a4a; }
  html.dark .btn { background: #1e2a4a; border-color: #2a2a4a; color: #e2e8f0; }
  html.dark .btn:hover { background: #2a3a5a; }
  html.dark .btn-primary { background: #5b8def; border-color: #5b8def; color: white; }
  html.dark .btn-success { background: #38b2ac; border-color: #38b2ac; color: white; }
  html.dark .ib:hover { background: #2a3a5a; color: #e2e8f0; }
  html.dark .go { background: #1a1a2e; border-color: #2a2a4a; color: #a0aec0; }
  html.dark .go:hover { border-color: #5b8def; background: #1e2a4a; color: #5b8def; }
  html.dark .go.active { border-color: #5b8def; background: #5b8def; color: white; }
  html.dark .sidebar-tab:hover { color: #5b8def; }
  html.dark .sidebar-tab.active { color: #5b8def; border-bottom-color: #5b8def; }
  html.dark .slot-empty { background: #1a1a2e; border-color: #2a2a4a; color: #636e80; }
  html.dark .preview-container { box-shadow: 0 12px 36px rgba(0,0,0,0.6); }
  html.dark .toast { background: #e2e8f0; color: #1a1a2e; }
  html.dark .modal { background: #16213e; }
  html.dark .loading { background: rgba(26,26,46,0.92); }
  html.dark .statusbar { background: #16213e; border-top-color: #2a2a4a; }
  html.dark .empty-state { color: #636e80; }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif;
    background: var(--bg); color: var(--text-primary); min-height: 100vh;
    font-size: 14px; line-height: 1.6;
  }

  /* ===== Main Layout ===== */
  .main-layout {
    display: grid; grid-template-columns: 320px 1fr;
    height: 100vh; overflow: hidden;
  }

  /* ===== Sidebar ===== */
  .sidebar { background: var(--surface); border-right: 1px solid var(--border); display: flex; flex-direction: column; overflow: hidden; }
  .sidebar-tabs { display: flex; border-bottom: 1px solid var(--border); background: var(--surface); }
  .sidebar-tab {
    flex: 1; padding: 12px 6px; border: none; background: transparent; cursor: pointer;
    font-size: 13px; color: var(--text-secondary); font-weight: 600;
    border-bottom: 2.5px solid transparent; transition: all 0.2s;
    display: flex; align-items: center; justify-content: center; gap: 5px;
  }
  .sidebar-tab:hover { color: var(--accent); }
  .sidebar-tab.active { color: var(--accent); border-bottom-color: var(--accent); }
  .sidebar-panel { flex: 1; overflow-y: auto; }
  .sidebar-panel.hidden { display: none; }

  /* ===== Upload ===== */
  .upload-zone {
    margin: 12px; border: 2.5px dashed var(--border); border-radius: var(--radius);
    padding: 24px 14px; text-align: center; cursor: pointer; transition: all 0.2s; background: var(--surface2);
  }
  .upload-zone:hover, .upload-zone.drag-over { border-color: var(--accent); background: var(--accent-light); }
  .upload-icon { font-size: 32px; margin-bottom: 6px; }
  .upload-text { font-size: 14px; color: var(--text-secondary); font-weight: 500; }
  .upload-hint { font-size: 12px; color: var(--text-muted); margin-top: 4px; }

  /* ===== File list ===== */
  .file-header {
    padding: 8px 12px; display: flex; align-items: center; justify-content: space-between;
    border-bottom: 1px solid var(--border); background: var(--surface2);
  }
  .file-count { font-size: 12px; color: var(--text-muted); }
  .file-actions { display: flex; gap: 4px; }
  .file-item {
    display: flex; align-items: center; padding: 8px 12px; border-bottom: 1px solid #f1f5f9;
    cursor: pointer; transition: all 0.15s; gap: 8px;
  }
  .file-item:hover { background: var(--surface2); }
  .file-check {
    width: 18px; height: 18px; border: 2px solid var(--border); border-radius: 4px;
    cursor: pointer; display: flex; align-items: center; justify-content: center; flex-shrink: 0; background: white;
    transition: all 0.15s;
  }
  .file-check.checked { background: var(--accent); border-color: var(--accent); }
  .file-check.checked::after { content: '✓'; color: white; font-size: 11px; font-weight: 700; }
  .file-thumb {
    width: 40px; height: 52px; background: var(--surface2); border: 1px solid var(--border);
    border-radius: 5px; overflow: hidden; flex-shrink: 0; display: flex; align-items: center; justify-content: center;
    position: relative;
  }
  .file-thumb img { width: 100%; height: 100%; object-fit: cover; }
  .file-thumb .type-badge {
    position: absolute; bottom: 0; left: 0; right: 0;
    background: rgba(0,0,0,0.65); color: white; font-size: 8px; text-align: center; padding: 1px 0;
  }
  .file-info { flex: 1; min-width: 0; }
  .file-name { font-size: 12px; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .file-meta { font-size: 11px; color: var(--text-muted); display: flex; gap: 6px; align-items: center; margin-top: 2px; }
  .copy-badge { background: var(--warning-light); color: var(--warning); padding: 1px 6px; border-radius: 3px; font-size: 10px; font-weight: 700; }
  .rot-badge { font-size: 10px; color: var(--accent); font-weight: 700; }
  .ib {
    width: 28px; height: 28px; border: none; background: transparent; cursor: pointer;
    border-radius: 5px; display: flex; align-items: center; justify-content: center;
    font-size: 13px; color: var(--text-muted); transition: all 0.15s;
  }
  .ib:hover { background: var(--border); color: var(--text-primary); }
  .ib.danger:hover { background: var(--danger-light); color: var(--danger); }

  /* ===== Settings ===== */
  .sec { padding: 12px; border-bottom: 1px solid var(--border); }
  .sec-title { font-size: 12px; font-weight: 700; color: var(--text-secondary); text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 10px; display: flex; align-items: center; gap: 6px; }
  .row { display: flex; align-items: center; justify-content: space-between; margin-bottom: 8px; gap: 8px; }
  .lbl { font-size: 13px; color: var(--text-secondary); flex-shrink: 0; min-width: 40px; }
  .ctrl { flex: 1; }
  select, input[type="number"], input[type="text"] {
    width: 100%; padding: 6px 10px; border: 1px solid var(--border); border-radius: var(--radius-sm);
    font-size: 13px; color: var(--text-primary); background: var(--surface); outline: none;
    transition: border-color 0.15s;
  }
  select:focus, input:focus { border-color: var(--border-focus); box-shadow: 0 0 0 3px rgba(37,99,235,0.1); }
  .rr { display: flex; align-items: center; gap: 8px; }
  input[type="range"] { flex: 1; height: 5px; accent-color: var(--accent); cursor: pointer; }
  .rv { width: 38px; text-align: right; font-size: 12px; color: var(--accent); font-weight: 700; }

  .grid-sel { display: grid; grid-template-columns: repeat(4, 1fr); gap: 6px; margin-bottom: 8px; }
  .go {
    border: 2px solid var(--border); border-radius: 6px; cursor: pointer;
    display: flex; align-items: center; justify-content: center; flex-direction: column; gap: 1px;
    transition: all 0.15s; background: var(--surface2); font-size: 11px; color: var(--text-secondary); font-weight: 600;
    padding: 10px 0;
  }
  .go:hover { border-color: var(--accent); background: var(--accent-light); color: var(--accent); }
  .go.active { border-color: var(--accent); background: var(--accent); color: white; }
  .ql-btn.active { background: var(--accent); color: white; border-color: var(--accent); }

  .trow { display: flex; align-items: center; justify-content: space-between; margin-bottom: 8px; }
  .tlbl { font-size: 13px; color: var(--text-secondary); }
  .tgl {
    position: relative; width: 40px; height: 22px; background: var(--border); border-radius: 11px;
    cursor: pointer; transition: background 0.2s; border: none; flex-shrink: 0;
  }
  .tgl::after {
    content: ''; position: absolute; width: 16px; height: 16px; background: white; border-radius: 50%;
    top: 3px; left: 3px; transition: left 0.2s; box-shadow: var(--shadow-sm);
  }
  .tgl.on { background: var(--accent); }
  .tgl.on::after { left: 21px; }

  /* ===== Buttons ===== */
  .btn {
    display: inline-flex; align-items: center; justify-content: center; gap: 5px;
    padding: 7px 14px; border: 1px solid var(--border); border-radius: var(--radius-sm); font-size: 13px;
    cursor: pointer; font-weight: 600; transition: all 0.15s; background: var(--surface); color: var(--text-primary); white-space: nowrap;
  }
  .btn:hover { background: var(--surface2); }
  .btn-primary { background: var(--accent); border-color: var(--accent); color: white; }
  .btn-primary:hover { background: var(--accent-hover); }
  .btn-success { background: var(--success); border-color: var(--success); color: white; }
  .btn-success:hover { background: #059669; }
  .btn-warning { background: var(--warning); border-color: var(--warning); color: white; }
  .btn-sm { padding: 5px 10px; font-size: 12px; }
  .btn-icon { padding: 5px 8px; min-width: 32px; }
  .btn:disabled { opacity: 0.5; cursor: not-allowed; }

  /* ===== Main area ===== */
  .main-area { display: flex; flex-direction: column; overflow: hidden; background: var(--bg); }
  .toolbar {
    background: var(--surface); border-bottom: 1px solid var(--border);
    padding: 8px 16px; display: flex; align-items: center; gap: 6px; flex-wrap: wrap;
  }
  .toolbar-group { display: flex; gap: 4px; align-items: center; }
  .toolbar-sep { width: 1px; height: 24px; background: var(--border); margin: 0 4px; }

  /* ===== Preview ===== */
  .preview-wrap { flex: 1; overflow: auto; padding: 20px; display: flex; justify-content: center; align-items: center; }
  #previewPages { align-self: flex-start; }
  .preview-container { background: var(--surface); box-shadow: var(--shadow-lg); position: relative; flex-shrink: 0; }
  .invoice-slot { overflow: hidden; position: absolute; display: flex; align-items: center; justify-content: center; background: white; }
  .invoice-slot img { display: block; }
  .slot-empty { display: flex; align-items: center; justify-content: center; width: 100%; height: 100%; background: #f8fafc; color: var(--text-muted); font-size: 13px; flex-direction: column; gap: 3px; border: 1px dashed var(--border); }
  .slot-num { position: absolute; top: 3px; right: 3px; background: rgba(0,0,0,0.55); color: white; font-size: 9px; padding: 2px 5px; border-radius: 3px; }
  .cut-line { position: absolute; left: 0; right: 0; border-top: 1px dashed #94a3b8; pointer-events: none; }
  .cut-line-v { position: absolute; top: 0; bottom: 0; border-left: 1px dashed #94a3b8; pointer-events: none; }
  .watermark { position: absolute; pointer-events: none; z-index: 10; font-weight: 900; white-space: nowrap; user-select: none; }
  .page-nav { padding: 8px 16px; display: flex; align-items: center; justify-content: center; gap: 8px; background: var(--surface); border-top: 1px solid var(--border); }
  .page-info { font-size: 13px; color: var(--text-secondary); }
  .page-dots { display: flex; gap: 4px; }
  .page-dot { width: 7px; height: 7px; border-radius: 50%; background: var(--border); cursor: pointer; transition: all 0.15s; }
  .page-dot.active { background: var(--accent); }
  .statusbar {
    background: var(--surface); border-top: 1px solid var(--border); padding: 4px 16px;
    display: flex; align-items: center; gap: 16px; font-size: 11px; color: var(--text-muted);
  }
  .status-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--success); display: inline-block; margin-right: 3px; }

  /* ===== Empty ===== */
  .empty-state { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 12px; color: var(--text-muted); padding: 40px; text-align: center; align-self: stretch; }
  .empty-icon { font-size: 52px; }

  /* ===== Modal ===== */
  .modal-bg { position: fixed; inset: 0; background: rgba(0,0,0,0.4); z-index: 200; display: flex; align-items: center; justify-content: center; backdrop-filter: blur(2px); }
  .modal-bg.hidden { display: none; }
  .modal { background: var(--surface); border-radius: 14px; box-shadow: var(--shadow-lg); padding: 20px; width: 460px; max-width: 90vw; max-height: 85vh; overflow-y: auto; }
  .modal-title { font-size: 17px; font-weight: 700; margin-bottom: 14px; }
  .modal-actions { display: flex; gap: 8px; justify-content: flex-end; margin-top: 16px; }

  /* ===== Loading ===== */
  .loading { position: fixed; inset: 0; background: rgba(255,255,255,0.88); z-index: 300; display: flex; align-items: center; justify-content: center; gap: 10px; font-size: 15px; color: var(--accent); }
  .loading.hidden { display: none; }
  .spinner { width: 20px; height: 20px; border: 2.5px solid var(--border); border-top-color: var(--accent); border-radius: 50%; animation: spin 0.8s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* ===== Toast ===== */
  .toast { position: fixed; bottom: 60px; left: 50%; transform: translateX(-50%) translateY(20px); background: var(--text-primary); color: white; padding: 10px 22px; border-radius: 8px; font-size: 14px; z-index: 400; opacity: 0; transition: all 0.3s; pointer-events: none; }
  .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

  /* ===== Scrollbar ===== */
  ::-webkit-scrollbar { width: 6px; height: 6px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: #bcc6d0; border-radius: 3px; }
</style>
</head>
<body>


<div class="loading hidden" id="loading"><div class="spinner"></div><span id="loadingText">处理中...</span></div>
<div class="toast" id="toast"></div>



<!-- File input — browser fallback only -->
<input type="file" id="fileInput" accept=".pdf,.jpg,.jpeg,.png,.bmp,.webp,.tiff" multiple style="display:none" onchange="handleFileInput(this.files)">

<div class="main-layout">
  <!-- Sidebar -->
  <aside class="sidebar">
    <div class="sidebar-tabs">
      <button class="sidebar-tab active" onclick="switchTab('files',this)">📁 发票</button>
      <button class="sidebar-tab" onclick="switchTab('settings',this)">⚙ 排版</button>
      <button class="sidebar-tab" onclick="switchTab('print',this)">🖨 打印</button>
      <button class="sidebar-tab" onclick="switchTab('prefs',this)">🔧 设置</button>
    </div>

    <div class="sidebar-panel" id="panel-files">
      <div class="upload-zone" id="dropZone" onclick="triggerUpload()" ondragover="handleDragOver(event)" ondragleave="handleDragLeave(event)" ondrop="handleDrop(event)">
        <div class="upload-icon">📂</div>
        <div class="upload-text">拖入发票或点击选择</div>
        <div class="upload-hint">支持 PDF / JPG / PNG 等格式</div>
      </div>
      <div class="file-header">
        <div class="file-count" id="fileCount">0 张，已选 0</div>
        <div class="file-actions">
          <button class="ib" onclick="selectAll()" title="全选">☑</button>
          <button class="ib" onclick="deselectAll()" title="取消全选">◻</button>
          <button class="ib danger" onclick="deleteSelected()" title="删除">🗑</button>
        </div>
      </div>
      <div id="fileList"></div>
    </div>

    <div class="sidebar-panel hidden" id="panel-settings">
      <div class="sec">
        <div class="sec-title">📄 纸张设置</div>
        <div class="row"><label class="lbl">规格</label><div class="ctrl"><select id="paperSize" onchange="onPaperChange()"><option value="A4">A4 (210×297mm)</option><option value="A5">A5 (148×210mm)</option><option value="B5">B5 (176×250mm)</option><option value="letter">Letter</option><option value="legal">Legal</option><option value="custom">自定义</option></select></div></div>
        <div id="customPaperRow" class="row" style="display:none"><label class="lbl">mm</label><div class="ctrl" style="display:flex;gap:4px;align-items:center"><input type="number" id="customW" value="210" min="50" style="width:60px" onchange="updatePreview()"> × <input type="number" id="customH" value="297" min="50" style="width:60px" onchange="updatePreview()"></div></div>
        <div class="row"><label class="lbl">方向</label><div class="ctrl"><select id="orientation" onchange="updatePreview();syncLayoutHighlight()"><option value="portrait">纵向</option><option value="landscape" selected>横向</option></select></div></div>
      </div>
      <div class="sec">
        <div class="sec-title">🗂 版面布局</div>
        <div class="grid-sel" id="gridSel" style="grid-template-columns:repeat(3,1fr)">
          <div class="go active" data-cols="1" data-rows="1" data-orient="landscape" onclick="setLayoutPreset(1,1,'landscape',this)">1×1<br><span style="font-size:9px;opacity:0.7">横向</span></div>
          <div class="go" data-cols="1" data-rows="2" data-orient="portrait" onclick="setLayoutPreset(1,2,'portrait',this)">1×2<br><span style="font-size:9px;opacity:0.7">纵向</span></div>
          <div class="go" data-cols="2" data-rows="2" data-orient="landscape" onclick="setLayoutPreset(2,2,'landscape',this)">2×2<br><span style="font-size:9px;opacity:0.7">横向</span></div>
        </div>
      </div>
      <div class="sec">
        <div class="sec-title">📐 边距 (mm)</div>
        <div class="row"><label class="lbl">上</label><div class="rr ctrl"><input type="range" id="marginTop" min="0" max="30" value="5" oninput="sn(this,'marginTopN');updatePreview()"><input type="number" id="marginTopN" min="0" max="30" value="5" style="width:48px" onchange="sr(this,'marginTop');updatePreview()"></div></div>
        <div class="row"><label class="lbl">下</label><div class="rr ctrl"><input type="range" id="marginBottom" min="0" max="30" value="5" oninput="sn(this,'marginBottomN');updatePreview()"><input type="number" id="marginBottomN" min="0" max="30" value="5" style="width:48px" onchange="sr(this,'marginBottom');updatePreview()"></div></div>
        <div class="row"><label class="lbl">左</label><div class="rr ctrl"><input type="range" id="marginLeft" min="0" max="30" value="5" oninput="sn(this,'marginLeftN');updatePreview()"><input type="number" id="marginLeftN" min="0" max="30" value="5" style="width:48px" onchange="sr(this,'marginLeft');updatePreview()"></div></div>
        <div class="row"><label class="lbl">右</label><div class="rr ctrl"><input type="range" id="marginRight" min="0" max="30" value="5" oninput="sn(this,'marginRightN');updatePreview()"><input type="number" id="marginRightN" min="0" max="30" value="5" style="width:48px" onchange="sr(this,'marginRight');updatePreview()"></div></div>
        <div style="display:flex;gap:6px;margin-top:6px">
          <button class="btn btn-sm" style="flex:1" onclick="setMP(10,10,10,10)">10mm</button>
          <button class="btn btn-sm" style="flex:1" onclick="setMP(5,5,5,5)">5mm</button>
          <button class="btn btn-sm" style="flex:1" onclick="setMP(0,0,0,0)">0</button>
        </div>
      </div>
      <div class="sec">
        <div class="sec-title">↔ 间距 (mm)</div>
        <div class="row"><label class="lbl">列间距</label><div class="rr ctrl"><input type="range" id="gapH" min="0" max="20" value="3" oninput="sn(this,'gapHN');updatePreview()"><input type="number" id="gapHN" min="0" max="20" value="3" style="width:48px" onchange="sr(this,'gapH');updatePreview()"></div></div>
        <div class="row"><label class="lbl">行间距</label><div class="rr ctrl"><input type="range" id="gapV" min="0" max="20" value="3" oninput="sn(this,'gapVN');updatePreview()"><input type="number" id="gapVN" min="0" max="20" value="3" style="width:48px" onchange="sr(this,'gapV');updatePreview()"></div></div>
      </div>
      <div class="sec">
        <div class="sec-title">🔍 缩放模式</div>
        <div class="row"><label class="lbl">模式</label><div class="ctrl"><select id="fitMode" onchange="onFitChange()"><option value="fit">自适应</option><option value="fill">拉伸填充</option><option value="original">原始大小</option><option value="custom">自定义 %</option></select></div></div>
        <div id="customScaleRow" class="row" style="display:none"><label class="lbl">%</label><div class="rr ctrl"><input type="range" id="customScale" min="20" max="200" value="100" oninput="sn(this,'customScaleN');updatePreview()"><input type="number" id="customScaleN" min="20" max="200" value="100" style="width:48px" onchange="sr(this,'customScale');updatePreview()"></div></div>
      </div>
      <div class="sec">
        <div class="sec-title">🖼 旋转</div>

<script>
// =====================================================
// Detect Tauri — use var to avoid conflict with Tauri's own injected scripts
// =====================================================
var isTauri = window.__TAURI_INTERNALS__ !== undefined;
var invoke  = isTauri ? window.__TAURI_INTERNALS__.invoke : null;
console.log('发票批量打印 v1.0.0 | isTauri:', isTauri);

// =====================================================
// State
// =====================================================
const S = {
  files: [],
  currentPage: 0,
  totalPages: 0,
  viewZoom: 0,
  layout: { cols: 1, rows: 1, orient: 'landscape' },
  editIdx: -1,
  feat: {
    cutline: true, number: false, border: false, trimWhite: false,
    watermark: false, collate: true, duplex: false, pageNum: false,
    printDate: false, confirmPrint: true,
    autoOpenPdf: true
  }
};

const PAPER = { A4:{w:210,h:297}, A5:{w:148,h:210}, B5:{w:176,h:250}, letter:{w:216,h:279}, legal:{w:216,h:356} };
const MM2PX = 96 / 25.4;

// =====================================================
// Helpers
// =====================================================
let toastT = null;
function toast(msg, dur) { dur=dur||2500; const e=document.getElementById('toast'); e.textContent=msg; e.classList.add('show'); clearTimeout(toastT); toastT=setTimeout(()=>e.classList.remove('show'),dur); }
function sn(s,n) { document.getElementById(n).value=s.value; }
function sr(n,s) { document.getElementById(s).value=n.value; }
function showLoading(t) { document.getElementById('loadingText').textContent=t||'处理中...'; document.getElementById('loading').classList.remove('hidden'); }
function hideLoading() { document.getElementById('loading').classList.add('hidden'); }
function fmtSize(b) { return b<1024?b+'B':b<1048576?(b/1024).toFixed(1)+'KB':(b/1048576).toFixed(1)+'MB'; }

// =====================================================
// FILE UPLOAD — via Tauri dialog plugin (reliable)
// =====================================================

// Primary upload: use Tauri dialog plugin to open native file picker
async function triggerUpload() {
  if (isTauri && invoke) {
    try {
      // Use the official dialog plugin — runs on background thread, no deadlock
      var result = await invoke('plugin:dialog|open', {
        options: {
          multiple: true,
          title: '选择发票文件',
          filters: [{ name: '发票文件', extensions: ['pdf', 'jpg', 'jpeg', 'png', 'bmp', 'webp', 'tiff', 'tif'] }]
        }
      });
      if (!result) return; // user cancelled

      var paths = typeof result === 'string' ? [result] : (Array.isArray(result) ? result : []);
      if (paths.length === 0) return;

      showLoading('读取 ' + paths.length + ' 个文件...');
      var fileDataList = await invoke('open_invoice_files', { paths });
      hideLoading();

      if (fileDataList && fileDataList.length > 0) {
        await processFileDataList(fileDataList);
      }
    } catch (err) {
      console.error('Dialog error:', err);
      hideLoading();
      toast('打开文件对话框失败: ' + String(err));
    }
  } else {
    // Browser fallback
    document.getElementById('fileInput').click();
  }
}

// Called when user selects files via <input> (browser fallback only)
async function handleFileInput(fl) {
  if (!fl || !fl.length) return;
  await processFiles(Array.from(fl));
  document.getElementById('fileInput').value = '';
}

// Process FileData array from Rust (base64 data URLs)
async function processFileDataList(fileDataList) {
  let added = 0;
  for (const fd of fileDataList) {
    try {
      const r = await loadFileFromDataUrl(fd.name, fd.dataUrl, fd.size, fd.ext, fd.path);
      if (r) {
        if (Array.isArray(r)) { S.files.push(...r); added += r.length; }
        else { S.files.push(r); added++; }
      }
    } catch (err) {
      console.error('Load file error:', fd.name, err);
    }
  }
  renderFileList(); updatePreview(); updatePrintBtn();
  if (added > 0) toast('已添加 ' + added + ' 张发票');
}

// Process an array of File objects
async function processFiles(files) {
  showLoading('载入 ' + files.length + ' 个文件...');
  let added = 0;
  for (const f of files) {
    try {
      const r = await loadFile(f);
      if (r) {
        if (Array.isArray(r)) { S.files.push(...r); added += r.length; }
        else { S.files.push(r); added++; }
      }
    } catch (err) {
      console.error('Load file error:', f.name, err);
    }
  }
  hideLoading(); renderFileList(); updatePreview(); updatePrintBtn();
  toast('已添加 ' + added + ' 张发票');
}

// Load a single File object
function loadFile(file) {
  return new Promise(resolve => {
    const ext = file.name.split('.').pop().toLowerCase();
    const id = 'f' + Date.now() + Math.random().toString(36).slice(2);

    // PDF — render with PDF.js
    if (ext === 'pdf') {
      if (!window.pdfjsLib) {
        toast('PDF.js 尚未加载，请稍后重试');
        resolve(null); return;
      }
      const url = URL.createObjectURL(file);
      pdfjsLib.getDocument({ url, cMapUrl: 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/cmaps/', cMapPacked: true, standardFontDataUrl: 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/standard_fonts/', disableFontFace: true, useSystemFonts: false }).promise.then(async pdf => {
        const results = [];
        for (let p = 1; p <= pdf.numPages; p++) {
          const page = await pdf.getPage(p);
          const vp = page.getViewport({ scale: 2.0 });
          const canvas = document.createElement('canvas');
          canvas.width = vp.width; canvas.height = vp.height;
          await page.render({ canvasContext: canvas.getContext('2d'), viewport: vp }).promise;
          const previewUrl = canvas.toDataURL('image/jpeg', 0.92);
          const img = new Image(); img.src = previewUrl;
          await new Promise(r => { img.onload = r; });
          results.push({
            id: id+'_p'+p,
            name: pdf.numPages>1 ? file.name.replace(/\.pdf$/i,'')+'_第'+p+'页.pdf' : file.name,
            size: file.size, type:'pdf', checked:true, previewUrl,
            copies:1, rotation:0, note:'', img,
            ow:img.naturalWidth, oh:img.naturalHeight
          });
        }
        URL.revokeObjectURL(url);
        resolve(results);
      }).catch(err => {
        console.error('PDF load error:', err);
        toast('PDF 加载失败: ' + file.name);
        resolve(null);
      });
    }
    // Image files
    else if (['jpg','jpeg','png','bmp','webp','tiff','tif'].includes(ext)) {
      const reader = new FileReader();
      reader.onload = async e => {
        const img = new Image(); img.src = e.target.result;
        await new Promise(r => { img.onload = r; });
        resolve({
          id, name:file.name, size:file.size, type:ext, checked:true,
          previewUrl:e.target.result, copies:1, rotation:0, note:'', img,
          ow:img.naturalWidth, oh:img.naturalHeight
        });
      };
      reader.onerror = () => { toast('读取失败: ' + file.name); resolve(null); };
      reader.readAsDataURL(file);
    }
    else {
      toast('不支持的格式: ' + ext);
      resolve(null);
    }
  });
}

// Load file from base64 data URL (returned by Rust backend)
function loadFileFromDataUrl(name, dataUrl, size, ext, filePath) {
  return new Promise(resolve => {
    const id = 'f' + Date.now() + Math.random().toString(36).slice(2);

    // PDF — try Windows native rendering first, fallback to PDF.js
    if (ext === 'pdf') {
      // If we have a file path and are in Tauri, try WinRT rendering
      if (isTauri && invoke && filePath) {
        console.log('[PDF] Trying WinRT native rendering for:', filePath);
        invoke('render_pdf_pages', { pdfPath: filePath, dpi: 200 }).then(async pages => {
          if (pages && pages.length > 0) {
            console.log('[PDF] WinRT rendering succeeded, pages:', pages.length);
            const results = [];
            for (var p = 0; p < pages.length; p++) {
              var pg = pages[p];
              var img = new Image(); img.src = pg.imageDataUrl;
              await new Promise(r => { img.onload = r; });
              results.push({
                id: id+'_p'+(p+1),
                name: pages.length>1 ? name.replace(/\.pdf$/i,'')+'_第'+(p+1)+'页.pdf' : name,
                size: size, type:'pdf', checked:true, previewUrl: pg.imageDataUrl,
                copies:1, rotation:0, note:'', img,
                ow:img.naturalWidth, oh:img.naturalHeight
              });
            }
            resolve(results.length === 1 ? results[0] : results);
            return;
          }
          // Fallback to PDF.js
          console.warn('[PDF] WinRT returned empty, falling back to PDF.js');
          loadPdfFromDataUrl(name, dataUrl, size, id, resolve);
        }).catch(err => {
          // WinRT failed, fallback to PDF.js
          console.error('[PDF] WinRT rendering failed, falling back to PDF.js:', err);
          loadPdfFromDataUrl(name, dataUrl, size, id, resolve);
        });
        return;
      }
      // No file path or not in Tauri, use PDF.js
      console.log('[PDF] Using PDF.js (no filePath or not in Tauri)');
      loadPdfFromDataUrl(name, dataUrl, size, id, resolve);
    }
    // Image files
    else {
      const img = new Image(); img.src = dataUrl;
      img.onload = () => resolve({
        id, name, size, type:ext, checked:true,
        previewUrl: dataUrl, copies:1, rotation:0, note:'', img,
        ow:img.naturalWidth, oh:img.naturalHeight
      });
      img.onerror = () => { toast('图片加载失败: ' + name); resolve(null); };
    }
  });
}

// PDF.js fallback for loading PDF from data URL
function loadPdfFromDataUrl(name, dataUrl, size, id, resolve) {
  if (!window.pdfjsLib) {
    toast('PDF.js 尚未加载，请稍后重试');
    resolve(null); return;
  }
  var raw = dataUrlToUint8Array(dataUrl);
  pdfjsLib.getDocument({ data: raw, cMapUrl: 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/cmaps/', cMapPacked: true, standardFontDataUrl: 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/standard_fonts/', disableFontFace: true, useSystemFonts: false }).promise.then(async pdf => {
    var results = [];
    for (var p = 1; p <= pdf.numPages; p++) {
      var page = await pdf.getPage(p);
      var vp = page.getViewport({ scale: 2.0 });
      var canvas = document.createElement('canvas');
      canvas.width = vp.width; canvas.height = vp.height;
      await page.render({ canvasContext: canvas.getContext('2d'), viewport: vp }).promise;
      var previewUrl = canvas.toDataURL('image/jpeg', 0.92);
      var img = new Image(); img.src = previewUrl;
      await new Promise(r => { img.onload = r; });
      results.push({
        id: id+'_p'+p,
        name: pdf.numPages>1 ? name.replace(/\.pdf$/i,'')+'_第'+p+'页.pdf' : name,
        size: size, type:'pdf', checked:true, previewUrl,
        copies:1, rotation:0, note:'', img,
        ow:img.naturalWidth, oh:img.naturalHeight
      });
    }
    resolve(results.length === 1 ? results[0] : results);
  }).catch(err => {
    console.error('PDF load error:', err);
    toast('PDF 加载失败: ' + name);
    resolve(null);
  });
}

// Convert data URL to Uint8Array
function dataUrlToUint8Array(dataUrl) {
  const base64 = dataUrl.split(',')[1] || dataUrl;
  const binaryStr = atob(base64);
  const bytes = new Uint8Array(binaryStr.length);
  for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);
  return bytes;
}

// Drag & Drop
function handleDragOver(e) { e.preventDefault(); e.stopPropagation(); document.getElementById('dropZone').classList.add('drag-over'); }
function handleDragLeave(e) { e.preventDefault(); e.stopPropagation(); document.getElementById('dropZone').classList.remove('drag-over'); }
async function handleDrop(e) {
  e.preventDefault(); e.stopPropagation();
  document.getElementById('dropZone').classList.remove('drag-over');
  if (e.dataTransfer.files && e.dataTransfer.files.length) {
    await processFiles(Array.from(e.dataTransfer.files));
  }
}

// =====================================================
// File list management
// =====================================================
function renderFileList() {
  const list = document.getElementById('fileList');
  const sel = S.files.filter(f=>f.checked).length;
  document.getElementById('fileCount').textContent = S.files.length + ' 张，已选 ' + sel;

// Trim whitespace
async function processTrim() {
  showLoading('裁剪白边...');
  for (const f of S.files) {
    if (f.previewUrl && !f.trimmedUrl) { f.trimmedUrl = await trimImg(f.previewUrl); }
  }
  hideLoading(); updatePreview();
}
function trimImg(src) {
  return new Promise(resolve => {
    const img = new Image(); img.src = src;
    img.onload = () => {
      const c = document.createElement('canvas'); c.width=img.naturalWidth; c.height=img.naturalHeight;
      const ctx = c.getContext('2d'); ctx.drawImage(img,0,0);
      const d = ctx.getImageData(0,0,c.width,c.height).data;
      let top=0,bottom=c.height,left=0,right=c.width;
      const th=245;
      for(;top<bottom;top++) for(let x=0;x<c.width;x++){const i=(top*c.width+x)*4;if(d[i]<th||d[i+1]<th||d[i+2]<th){x=c.width;top=bottom;break;}}
      for(;bottom-->0;) for(let x=0;x<c.width;x++){const i=(bottom*c.width+x)*4;if(d[i]<th||d[i+1]<th||d[i+2]<th){x=c.width;break;}}
      for(;left<right;left++) for(let y=top;y<=bottom;y++){const i=(y*c.width+left)*4;if(d[i]<th||d[i+1]<th||d[i+2]<th){y=bottom+1;break;}}
      for(;right-->0;) for(let y=top;y<=bottom;y++){const i=(y*c.width+right)*4;if(d[i]<th||d[i+1]<th||d[i+2]<th){y=bottom+1;break;}}
      if(top>=bottom||left>=right){resolve(src);return;}
      const p=5;top=Math.max(0,top-p);left=Math.max(0,left-p);bottom=Math.min(c.height-1,bottom+p);right=Math.min(c.width-1,right+p);
      const c2=document.createElement('canvas');c2.width=right-left+1;c2.height=bottom-top+1;
      c2.getContext('2d').drawImage(c,left,top,c2.width,c2.height,0,0,c2.width,c2.height);
      resolve(c2.toDataURL('image/jpeg',0.92));
    };
  });
}

function buildPages(files, settings) {
  const perPage = settings.cols * settings.rows;
  const pages = [];
  for (let i=0; i<files.length; i+=perPage) pages.push(files.slice(i,i+perPage));
  return pages;
}

function updatePreview() {
  const files = getActiveFiles();
  document.getElementById('stFiles').textContent = S.files.filter(f=>f.checked).length + ' 张';
  document.getElementById('stLayout').textContent = S.layout.rows+'×'+S.layout.cols;

function renderPage(pageFiles, pi, total, s) {
  const {paperW,paperH,cols,rows,marginTop,marginBottom,marginLeft,marginRight,gapH,gapV} = s;
  const pw=paperW*MM2PX, ph=paperH*MM2PX;
  const wrap=document.getElementById('previewWrap');
  var scale;
  if(S.viewZoom===0||document.getElementById('zoomSel').value==='fit'){
    scale=Math.min((wrap.clientWidth-40)/pw,(wrap.clientHeight-40)/ph,1.2);
  } else {
    scale=S.viewZoom/100;
  }
  const dw=Math.round(pw*scale), dh=Math.round(ph*scale);
  const mt=marginTop*MM2PX,mb=marginBottom*MM2PX,ml=marginLeft*MM2PX,mr=marginRight*MM2PX,gh=gapH*MM2PX,gv=gapV*MM2PX;
  const sw=(pw-ml-mr-(cols-1)*gh)/cols, sh=(ph-mt-mb-(rows-1)*gv)/rows;

  let html='';
  for(let r=0;r<rows;r++) for(let c=0;c<cols;c++) {
    const si=r*cols+c, f=pageFiles?pageFiles[si]:null;
    const sx=(ml+c*(sw+gh))*scale, sy=(mt+r*(sh+gv))*scale;
    let inner='';
    if(f&&f.previewUrl) {
      const src=S.feat.trimWhite&&f.trimmedUrl?f.trimmedUrl:f.previewUrl;
      let rot=0;
      if(s.globalRotation==='auto'){const isSlotL=sw>sh,isImgL=(f.ow||1)>(f.oh||1);rot=(isSlotL!==isImgL)?(f.rotation+90)%360:f.rotation;}
      else rot=((parseInt(s.globalRotation)||0)+f.rotation)%360;
      const filt=s.colorMode==='grayscale'?'filter:grayscale(1);':s.colorMode==='bw'?'filter:grayscale(1) contrast(1.5);':'';
      const fit=s.fitMode==='fill'?'cover':'contain';
      const bdr=s.border?`box-shadow:inset 0 0 0 1px #000;`:`box-shadow:inset 0 0 0 0.5px rgba(0,0,0,0.1);`;
      inner=`<img src="${src}" style="max-width:100%;max-height:100%;object-fit:${fit};${filt}${rot?'transform:rotate('+rot+'deg);':''}">`;
      if(s.number) inner+=`<div class="slot-num">${pi*rows*cols+si+1}</div>`;
      if(s.watermark&&s.watermarkText) {
        const ws=Math.min(sw*scale,sh*scale)*0.15;
        inner+=`<div class="watermark" style="color:${s.watermarkColor};opacity:${s.watermarkOpacity};font-size:${ws}px;transform:translate(-50%,-50%) rotate(${s.watermarkAngle}deg);top:50%;left:50%">${s.watermarkText}</div>`;
      }
      html+=`<div class="invoice-slot" style="position:absolute;left:${sx}px;top:${sy}px;width:${sw*scale}px;height:${sh*scale}px;${bdr}">${inner}</div>`;
    } else {
      inner=`<div class="slot-empty">空</div>`;
      html+=`<div class="invoice-slot" style="position:absolute;left:${sx}px;top:${sy}px;width:${sw*scale}px;height:${sh*scale}px">${inner}</div>`;
    }
  }
  if(s.cutline&&(cols>1||rows>1)) {
    for(let r=1;r<rows;r++){const y=(mt+r*sh+(r-0.5)*gv)*scale;html+=`<div class="cut-line" style="top:${y}px"></div>`;}
    for(let c=1;c<cols;c++){const x=(ml+c*sw+(c-0.5)*gh)*scale;html+=`<div class="cut-line-v" style="left:${x}px"></div>`;}
  }
  if(s.pageNum) html+=`<div style="position:absolute;bottom:5px;left:0;right:0;text-align:center;font-size:10px;color:#94a3b8">第 ${pi+1} 页 / 共 ${total} 页</div>`;

  document.getElementById('previewPages').style.display='block';
  document.getElementById('emptyState').style.display='none';
  document.getElementById('previewPages').innerHTML=`<div class="preview-container" style="width:${dw}px;height:${dh}px"><div style="width:${dw}px;height:${dh}px;background:white;position:relative">${html}</div></div>`;
  document.getElementById('pageInfo').textContent=`${pi+1} / ${total}`;
  document.getElementById('prevBtn').disabled=pi===0;
  document.getElementById('nextBtn').disabled=pi===total-1;
  document.getElementById('pageNav').style.display='flex';
}

function updatePageDots(t) { const d=document.getElementById('pageDots'); if(t<=1){d.innerHTML='';return;} const m=Math.min(t,12); d.innerHTML=Array.from({length:m},(_,i)=>`<div class="page-dot ${i===S.currentPage?'active':''}" onclick="gotoPage(${i})"></div>`).join(''); }
function prevPage() { if(S.currentPage>0){S.currentPage--;updatePreview();} }
function nextPage() { if(S.currentPage<S.totalPages-1){S.currentPage++;updatePreview();} }
function gotoPage(i) { S.currentPage=i; updatePreview(); }
function changeZoom(d) {
  var sel = document.getElementById('zoomSel');
  // 当前缩放值
  var cur;
  if (sel.value === 'fit') {
    // 从预览区实际缩放比推算
    try {
      var wrap = document.getElementById('previewWrap');
      if (wrap) {
        var ps = document.getElementById('paperSize').value;
        var pw, ph;
        if (ps === 'custom') { pw = parseFloat(document.getElementById('customW').value) || 210; ph = parseFloat(document.getElementById('customH').value) || 297; }
        else { var p = PAPER[ps] || PAPER.A4; pw = p.w; ph = p.h; }
        if (document.getElementById('orientation').value === 'landscape') { var tmp = pw; pw = ph; ph = tmp; }
        var fitScale = Math.min((wrap.clientWidth - 40) / (pw * MM2PX), (wrap.clientHeight - 40) / (ph * MM2PX), 1.2);
        cur = Math.round(fitScale * 100);
      } else { cur = 100; }
    } catch(e) { cur = 100; }
  } else {
    cur = parseInt(sel.value) || 100;
  }
  // 取所有数值选项并排序
  var numericValues = [];
  Array.from(sel.options).forEach(function(o) { var v = parseInt(o.value); if (!isNaN(v)) numericValues.push(v); });
  numericValues.sort(function(a, b) { return a - b; });
  // 找严格大于/小于当前值的下一个选项
  var newVal = cur;
  if (d > 0) {
    for (var i = 0; i < numericValues.length; i++) { if (numericValues[i] > cur) { newVal = numericValues[i]; break; } }
  } else {
    for (var i = numericValues.length - 1; i >= 0; i--) { if (numericValues[i] < cur) { newVal = numericValues[i]; break; } }
  }
  sel.value = newVal;
  S.viewZoom = newVal;
  updatePreview();
}
function setZoom(v) {
  if (v === 'fit') { S.viewZoom = 0; document.getElementById('zoomSel').value = 'fit'; }
  else { S.viewZoom = parseInt(v) || 100; document.getElementById('zoomSel').value = v; }
  updatePreview();
}
function updatePrintBtn() { document.getElementById('printBtn').disabled=!S.files.some(f=>f.checked); }

// =====================================================
// Render page to canvas (for PDF generation)
// =====================================================
function renderPageToCanvas(pageFiles, s) {
  const {paperW,paperH,cols,rows,marginTop,marginBottom,marginLeft,marginRight,gapH,gapV} = s;
  const DPI = 150;
  const pxPerMm = DPI / 25.4;
  const pw = Math.round(paperW * pxPerMm);
  const ph = Math.round(paperH * pxPerMm);

  const canvas = document.getElementById('renderCanvas');
  canvas.width = pw; canvas.height = ph;
  const ctx = canvas.getContext('2d');
  ctx.fillStyle = 'white'; ctx.fillRect(0, 0, pw, ph);

  const mt = marginTop * pxPerMm, mb = marginBottom * pxPerMm;
  const ml = marginLeft * pxPerMm, mr = marginRight * pxPerMm;
  const gh = gapH * pxPerMm, gv = gapV * pxPerMm;
  const sw = (pw - ml - mr - (cols-1)*gh) / cols;
  const sh = (ph - mt - mb - (rows-1)*gv) / rows;

  for (let r = 0; r < rows; r++) {
    for (let c = 0; c < cols; c++) {
      const si = r * cols + c;
      const f = pageFiles ? pageFiles[si] : null;
      const sx = ml + c * (sw + gh);
      const sy = mt + r * (sh + gv);

      if (f && f.img) {
        ctx.save();
        ctx.beginPath(); ctx.rect(sx, sy, sw, sh); ctx.clip();

        let rot = 0;
        if (s.globalRotation === 'auto') {
          const isSlotL = sw > sh, isImgL = (f.ow||1) > (f.oh||1);
          rot = (isSlotL !== isImgL) ? (f.rotation+90)%360 : f.rotation;
        } else { rot = ((parseInt(s.globalRotation)||0) + f.rotation) % 360; }

        const imgW = f.ow || f.img.naturalWidth;
        const imgH = f.oh || f.img.naturalHeight;
        let drawW, drawH;
        const eW = (rot===90||rot===270) ? imgH : imgW;
        const eH = (rot===90||rot===270) ? imgW : imgH;

        if (s.fitMode === 'fill') { drawW = sw; drawH = sh; }
        else { const sc = Math.min(sw/eW, sh/eH); drawW = eW*sc; drawH = eH*sc; }

        const drawX = sx + (sw - drawW) / 2;
        const drawY = sy + (sh - drawH) / 2;

        if (rot) {
          const cx = sx + sw/2, cy = sy + sh/2;
          ctx.translate(cx, cy); ctx.rotate(rot * Math.PI / 180); ctx.translate(-cx, -cy);
        }

        ctx.drawImage(f.img, drawX, drawY, drawW, drawH);

        // Apply grayscale/bw
        if (s.colorMode === 'grayscale' || s.colorMode === 'bw') {
          const imgData = ctx.getImageData(sx, sy, Math.ceil(sw), Math.ceil(sh));
          const data = imgData.data;
          for (let i = 0; i < data.length; i += 4) {
            const gray = 0.299*data[i] + 0.587*data[i+1] + 0.114*data[i+2];
            if (s.colorMode === 'bw') { data[i]=data[i+1]=data[i+2] = gray>128?255:0; }
            else { data[i]=data[i+1]=data[i+2] = gray; }
          }
          ctx.putImageData(imgData, sx, sy);
        }
        ctx.restore();
      }
      if (s.border) { ctx.strokeStyle='#000'; ctx.lineWidth=1; ctx.strokeRect(sx, sy, sw, sh); }
      if (s.number && f) { ctx.fillStyle='rgba(0,0,0,0.5)'; ctx.font='11px sans-serif'; ctx.fillText(String(si+1), sx+sw-18, sy+14); }
    }
  }

  // Cut lines
  if (s.cutline && (cols>1||rows>1)) {
    ctx.setLineDash([6,4]); ctx.strokeStyle='#94a3b8'; ctx.lineWidth=0.5;
    for (let r=1;r<rows;r++) { const y=mt+r*sh+(r-0.5)*gv; ctx.beginPath();ctx.moveTo(ml,y);ctx.lineTo(pw-mr,y);ctx.stroke(); }
    for (let c=1;c<cols;c++) { const x=ml+c*sw+(c-0.5)*gh; ctx.beginPath();ctx.moveTo(x,mt);ctx.lineTo(x,ph-mb);ctx.stroke(); }
    ctx.setLineDash([]);
  }

  // Watermark
  if (s.watermark && s.watermarkText) {
    ctx.save();
    const fontSize = Math.min(pw,ph)*0.08;
    ctx.font = `900 ${fontSize}px sans-serif`;
    ctx.fillStyle = s.watermarkColor; ctx.globalAlpha = s.watermarkOpacity;
    ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
    ctx.translate(pw/2, ph/2); ctx.rotate(s.watermarkAngle * Math.PI/180);
    ctx.fillText(s.watermarkText, 0, 0);
    ctx.restore();
  }

  return canvas.toDataURL('image/jpeg', 0.95);
}

// =====================================================
// Print / PDF via Tauri backend
// =====================================================
async function doPrint() {
  var files = getActiveFiles();
  if (!files.length) { toast('请先添加发票！'); return; }

  showLoading('正在渲染页面...');
  try {
    var s = getSettings();
    var pages = buildPages(files, s);
    var copies = s.copies;
    var expandedPages = s.collate
      ? Array(copies).fill(pages).flat()
      : pages.flatMap(function(p){ return Array(copies).fill(p); });

    var pageImages = [];
    for (var i = 0; i < expandedPages.length; i++) {
      document.getElementById('loadingText').textContent = '渲染第 ' + (i+1) + '/' + expandedPages.length + ' 页...';
      pageImages.push(renderPageToCanvas(expandedPages[i], s));
    }

    if (isTauri && invoke) {
      document.getElementById('loadingText').textContent = '正在生成PDF，请稍候...';
      var printMode = document.getElementById('printMode').value;
      var result = await invoke('generate_and_print', {
        request: { pages: pageImages, paperW: s.paperW, paperH: s.paperH },
        directPrint: printMode === 'direct'
      });
      hideLoading();
      if (result.success) {
        toast('🖨 ' + result.message);
      } else {
        toast('打印失败：' + result.message);
      }
    } else {
      hideLoading();
      fallbackPrint(pages, s);
    }
  } catch (err) {
    hideLoading();
    console.error('Print error:', err);
    toast('打印出错：' + String(err));
  }
}

async function savePdf() {
  var files = getActiveFiles();
  if (!files.length) { toast('请先添加发票！'); return; }

  // 确定保存路径：优先使用已存目录，否则弹窗选择
  var savePath = null;
  var savedDir = getSaveDir();
  if (isTauri && invoke) {
    try {
      var now = new Date();
      var ts = now.getFullYear() + String(now.getMonth()+1).padStart(2,'0') + String(now.getDate()).padStart(2,'0') + '_' + String(now.getHours()).padStart(2,'0') + String(now.getMinutes()).padStart(2,'0') + String(now.getSeconds()).padStart(2,'0');
      var defaultName = '发票打印_' + ts + '.pdf';
      if (savedDir) {
        // 已有保存目录，直接拼接路径，不弹窗
        savePath = savedDir + '\\' + defaultName;
        // 如果文件已存在，加序号
        var base = savePath.replace('.pdf','');
        var idx = 1;
        // 注意：这里无法在前端检测文件是否存在，由 Rust 端处理覆盖
      } else {
        // 首次未设置目录，弹窗选择
        savePath = await invoke('plugin:dialog|save', {
          options: {
            title: '保存发票PDF',
            defaultPath: defaultName,
            filters: [{ name: 'PDF文件', extensions: ['pdf'] }]
          }
        });
        if (!savePath) return; // 用户取消
        // 记住用户选择的目录
        var dir = savePath.substring(0, savePath.lastIndexOf('\\'));
        if (dir) setSaveDir(dir);
      }
    } catch(e) {
      savePath = null;
    }
  }

  showLoading('正在渲染页面...');
  try {
    var s = getSettings();
    var pages = buildPages(files, s);
    var pageImages = [];
    for (var i = 0; i < pages.length; i++) {
      document.getElementById('loadingText').textContent = '渲染第 ' + (i+1) + '/' + pages.length + ' 页...';
      pageImages.push(renderPageToCanvas(pages[i], s));
    }

    if (isTauri && invoke) {
      document.getElementById('loadingText').textContent = '正在生成PDF...';
      var autoOpen = S.feat.autoOpenPdf;
      var result = await invoke('save_pdf', {
        request: { pages: pageImages, paperW: s.paperW, paperH: s.paperH },
        savePath: savePath,
        autoOpen: autoOpen
      });
      if (result.success) {
        toast('✅ PDF已保存: ' + result.pdfPath);
      } else {
        toast('PDF生成失败：' + result.message);
      }
    } else {
      fallbackPrint(pages, s);
    }
  } catch (err) {
    console.error('PDF error:', err);
    toast('PDF生成出错：' + String(err));
  }
  hideLoading();
}

function fallbackPrint(pages, s) {
  const files = getActiveFiles();
  const w = window.open('', '_blank');
  if (!w) { alert('弹出窗口被阻止'); return; }
  let html = `<!DOCTYPE html><html><head><meta charset="UTF-8"><title>发票打印</title><style>*{margin:0;padding:0;box-sizing:border-box}@page{size:${s.paperW}mm ${s.paperH}mm;margin:0}body{background:white}.page{width:${s.paperW}mm;height:${s.paperH}mm;position:relative;page-break-after:always;background:white;overflow:hidden}.slot{position:absolute;overflow:hidden;display:flex;align-items:center;justify-content:center}.slot img{max-width:100%;max-height:100%;object-fit:contain}</style></head><body>`;
  const expanded = s.collate ? Array(s.copies).fill(pages).flat() : pages.flatMap(p => Array(s.copies).fill(p));
  expanded.forEach(page => {
    html += `<div class="page">`;
    const mt=s.marginTop,mb=s.marginBottom,ml=s.marginLeft,mr=s.marginRight;
    const slotW=(s.paperW-ml-mr-(s.cols-1)*s.gapH)/s.cols;
    const slotH=(s.paperH-mt-mb-(s.rows-1)*s.gapV)/s.rows;
    for(let r=0;r<s.rows;r++) for(let c=0;c<s.cols;c++) {
      const f=page[r*s.cols+c];
      const x=ml+c*(slotW+s.gapH), y=mt+r*(slotH+s.gapV);
      if(f&&f.previewUrl) {
        const src=S.feat.trimWhite&&f.trimmedUrl?f.trimmedUrl:f.previewUrl;
        html+=`<div class="slot" style="left:${x}mm;top:${y}mm;width:${slotW}mm;height:${slotH}mm"><img src="${src}"></div>`;
      }
    }
    html += `</div>`;
  });
  html += `</body></html>`;
  w.document.write(html); w.document.close();
  w.onload = () => setTimeout(() => w.print(), 500);
}

// Save settings
// =====================================================
// Preferences toggle
function tglPref(k, btn) {
  S.feat[k] = !S.feat[k];
  btn.classList.toggle('on', S.feat[k]);
}

// Save directory
function getSaveDir() {
  try { return localStorage.getItem('fapiao-save-dir') || ''; } catch(e) { return ''; }
}
function setSaveDir(dir) {
  try { localStorage.setItem('fapiao-save-dir', dir); } catch(e) {}
  document.getElementById('saveDir').value = dir;
}
async function pickSaveDir() {
  if (isTauri && invoke) {
    try {
      var result = await invoke('plugin:dialog|open', {
        options: { directory: true, title: '选择PDF保存目录' }
      });
      if (result) {
        setSaveDir(result);
        toast('保存目录已设置');
      }
    } catch(e) { toast('选择目录失败: ' + String(e)); }
  }
}
function clearSaveDir() {
  setSaveDir('');
  toast('已清除保存目录');
}

// Theme switch
function applyTheme() {
  var theme = document.getElementById('themeMode').value;
  if (theme === 'dark') {
    document.documentElement.classList.add('dark');
  } else {
    document.documentElement.classList.remove('dark');
  }
  // Persist to localStorage
  try { localStorage.setItem('fapiao-theme', theme); } catch(e) {}
}

// Export settings to JSON file
function exportSettings() {
  var data = { layout: S.layout, feat: S.feat, paperSize: document.getElementById('paperSize').value, orientation: document.getElementById('orientation').value, copies: document.getElementById('copies').value, colorMode: document.getElementById('colorMode').value, printMode: document.getElementById('printMode').value, saveDir: getSaveDir() };
  var blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
  var a = document.createElement('a'); a.href = URL.createObjectURL(blob);
  a.download = '发票打印设置.json'; a.click();
  toast('设置已导出');
}

// Reset to defaults
function resetSettings() {
  if (!confirm('确认恢复所有默认设置？')) return;
  // Reset state
  S.layout = { cols: 1, rows: 1 };
  S.feat = { cutline: true, number: false, border: false, trimWhite: false, watermark: false, collate: true, duplex: false, pageNum: false, printDate: false, confirmPrint: true, autoOpenPdf: true };
  S.viewZoom = 0;
  // Reset UI controls
  document.getElementById('paperSize').value = 'A4';
  document.getElementById('orientation').value = 'landscape';
  document.getElementById('marginTop').value = 5; document.getElementById('marginTopN').value = 5;
  document.getElementById('marginBottom').value = 5; document.getElementById('marginBottomN').value = 5;
  document.getElementById('marginLeft').value = 5; document.getElementById('marginLeftN').value = 5;
  document.getElementById('marginRight').value = 5; document.getElementById('marginRightN').value = 5;
  document.getElementById('gapH').value = 3; document.getElementById('gapHN').value = 3;
  document.getElementById('gapV').value = 3; document.getElementById('gapVN').value = 3;
  document.getElementById('fitMode').value = 'fit';
  document.getElementById('globalRotation').value = '0';
  document.getElementById('copies').value = 1;
  document.getElementById('colorMode').value = 'color';
  document.getElementById('pageOrder').value = 'normal';
  document.getElementById('customPaperRow').style.display = 'none';
  document.getElementById('customScaleRow').style.display = 'none';
  document.getElementById('wmOpts').style.display = 'none';
  document.getElementById('zoomSel').value = 'fit';
  // Reset toggles
  document.getElementById('toggleCutline').classList.add('on');
  document.getElementById('toggleNumber').classList.remove('on');
  document.getElementById('toggleBorder').classList.remove('on');
  document.getElementById('toggleTrimWhite').classList.remove('on');
  document.getElementById('toggleWatermark').classList.remove('on');
  document.getElementById('toggleCollate').classList.add('on');
  document.getElementById('toggleDuplex').classList.remove('on');
  document.getElementById('togglePageNum').classList.remove('on');
  document.getElementById('toggleDate').classList.remove('on');
  document.getElementById('toggleConfirm').classList.add('on');
  document.getElementById('toggleAutoOpenPdf').classList.add('on');
  document.getElementById('printMode').value = 'dialog';
  document.getElementById('themeMode').value = 'light';
  document.documentElement.classList.remove('dark');
  try { localStorage.removeItem('fapiao-theme'); } catch(e) {}
  try { localStorage.removeItem('fapiao-save-dir'); } catch(e) {}
  document.getElementById('saveDir').value = '';
  // Sync layout highlight
  syncLayoutHighlight();
  updatePreview();
  toast('已恢复默认设置');
}

// =====================================================
// Keyboard shortcuts
// =====================================================
document.addEventListener('keydown', e => {
  if(e.target.tagName==='INPUT'||e.target.tagName==='SELECT'||e.target.tagName==='TEXTAREA') return;
  if(e.key==='ArrowLeft'||e.key==='ArrowUp'){e.preventDefault();prevPage();}
  if(e.key==='ArrowRight'||e.key==='ArrowDown'){e.preventDefault();nextPage();}
  if((e.ctrlKey||e.metaKey)&&e.key==='p'){e.preventDefault();doPrint();}
  if((e.ctrlKey||e.metaKey)&&e.key==='o'){e.preventDefault();triggerUpload();}
});

// Global drag & drop (browser fallback)
document.body.addEventListener('dragover',e=>e.preventDefault());
document.body.addEventListener('drop',e=>{e.preventDefault();if(e.dataTransfer.files.length)processFiles(Array.from(e.dataTransfer.files));});
window.addEventListener('resize',()=>{if(S.files.length)updatePreview();});

// Tauri drag & drop — Rust calls window._tauriFileDrop(paths) via eval()
window._tauriFileDrop = function(paths) {
  if (!Array.isArray(paths) || paths.length === 0) return;
  (async function() {
    try {
      showLoading('读取 ' + paths.length + ' 个文件...');
      var fileDataList = await invoke('open_invoice_files', { paths: paths });
      hideLoading();
      if (fileDataList && fileDataList.length > 0) {
        await processFileDataList(fileDataList);
      }
    } catch(err) {
      hideLoading();
      toast('拖放文件读取失败: ' + String(err));
    }
  })();
};

})();
